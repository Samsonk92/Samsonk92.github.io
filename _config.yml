description: A results-driven data analyst with over five years of experience leveraging Microsoft Excel, SQL, 
and Power BI to deliver actionable insights and support data-driven decision-making. 
Skilled in using Excel for advanced data automation, including pivot tables, Power Query, complex formulas, 
and VBA to streamline reporting processes and improve efficiency. Proficient in SQL (Structured Query Language) 
for data extraction, transformation, and interrogation of large, complex datasets. Experienced in writing optimised queries, 
joins, CTEs, and window functions to support analysis and reporting requirements. 
Strong expertise in Power BI for building interactive dashboards and business intelligence reports, 
enabling stakeholders to monitor key performance indicators, identify trends, and make informed strategic decisions. 
Adept at data modelling, DAX calculations, and creating visually compelling and user-friendly reports.
Additional strengths include data cleaning and preprocessing, ETL processes, data validation, and ensuring data quality and
integrity. Experienced in stakeholder engagement, translating complex data into clear insights, and supporting business 
performance through analytics. Complemented by a solid analytical background and problem-solving mindset, 
with the ability to manage multiple priorities, work with cross-functional teams, and deliver accurate, timely insights 
in fast-paced environments.

